name: Backend CI

on:
  push:
    branches: [master]
    paths: ['backend/**']
  pull_request:
    branches: [master]
    paths: ['backend/**']

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21+'
          cache: true
          cache-dependency-path: backend/go.sum
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run tests
        run: go test -v ./...
      
      - name: Build
        run: go build -o xiaoyu-memory-backend .

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21+'
      
      - name: Build binary
        run: |
          cd backend
          CGO_ENABLED=0 go build -o xiaoyu-memory-backend .
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: dachui61/xiaoyu-memory-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
