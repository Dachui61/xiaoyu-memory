name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Flutter Tests
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false  # 禁用缓存避免旧版包
      
      - name: Clear pub cache
        run: rm -rf ~/.pub-cache/hosted/pub.dev/record_linux-0.7.2 ~/.pub-cache/hosted/pub.dev/record_linux-*
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test

  analyze:
    name: Flutter Analyze
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false
      
      - name: Clear pub cache
        run: rm -rf ~/.pub-cache/hosted/pub.dev/record_linux-0.7.2 ~/.pub-cache/hosted/pub.dev/record_linux-*
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Analyze
        run: flutter analyze || true

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false
      
      - name: Clear pub cache
        run: rm -rf ~/.pub-cache/hosted/pub.dev/record_linux-0.7.2 ~/.pub-cache/hosted/pub.dev/record_linux-*
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: iOS build (simulator)
        run: flutter build ios --simulator --no-codesign

  android-build:
    name: Android Build
    runs-on: macos-latest
    needs: analyze
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false
      
      - name: Clear pub cache
        run: rm -rf ~/.pub-cache/hosted/pub.dev/record_linux-0.7.2 ~/.pub-cache/hosted/pub.dev/record_linux-*
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Build Android APK
        run: flutter build apk --debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
